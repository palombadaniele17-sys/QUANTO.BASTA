<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

let currentLang = 'it';

function selectLanguage(lang) {
  currentLang = lang;
  
  // 1. Aggiunge la classe per nascondere lo schermo lingua con effetto dissolvenza
  document.getElementById('language-screen').classList.add('hidden');
  
  // 2. Rende visibile il contenitore principale del menu
  document.getElementById('main-content').style.display = 'block';
  
  // 3. Traduce i testi fissi dell'interfaccia
  document.getElementById('hero-tag').innerText = menuData[lang].heroTag;
  document.getElementById('footer-welcome').innerText = menuData[lang].footerWelcome;
  document.getElementById('footer-nfc').innerText = menuData[lang].footerNfc;
  
  // 4. Genera dinamicamente le categorie e i piatti
  buildMenu();
  
  // 5. Mostra in automatico gli Antipasti come prima mini-pagina attiva
  openPage('antipasti');
}

function buildMenu() {
  const data = menuData[currentLang];
  const nav = document.getElementById('main-nav');
  const pagesContainer = document.getElementById('menu-pages');
  
  nav.innerHTML = '';
  pagesContainer.innerHTML = '';
  
  // Ciclo per creare i pulsanti di navigazione e le mini-pagine
  Object.keys(data.categories).forEach(catKey => {
    // Creazione del Bottone della categoria nella barra in alto
    const button = document.createElement('button');
    button.className = 'pill';
    button.setAttribute('onclick', `openPage('${catKey}')`);
    button.innerText = data.categories[catKey];
    nav.appendChild(button);
    
    // Creazione della mini-pagina
    const pageDiv = document.createElement('div');
    pageDiv.id = catKey;
    pageDiv.className = 'page';
    pageDiv.innerHTML = `<h2><span>//</span> ${data.categories[catKey]}</h2>`;
    
    // Generazione dei singoli piatti della categoria
    data.items[catKey].forEach(item => {
      if (item.type === 'promo') {
        pageDiv.innerHTML += `
          <div class="promo-box">
            <div class="promo-title">
              <span>${item.name}</span>
              <span style="color:var(--accent-amber)">${item.price}</span>
            </div>
            <p class="desc" style="margin-top: 8px; color: #FFF;">${item.desc}</p>
          </div>
        `;
      } else {
        pageDiv.innerHTML += `
          <div class="item">
            <div class="row">
              <div class="name">${item.name}</div>
              <div class="price">${item.price}</div>
            </div>
            <p class="desc">${item.desc}</p>
          </div>
        `;
      }
    });
    
    // Bottone inferiore per chiudere la pagina e tornare su
    pageDiv.innerHTML += `<button class="back-btn" onclick="closePages()">${data.backText}</button>`;
    pagesContainer.appendChild(pageDiv);
  });
}

function openPage(pageId) {
  const pages = document.querySelectorAll('.page');
  pages.forEach(page => page.classList.remove('active'));
  
  const pills = document.querySelectorAll('.pill');
  pills.forEach(pill => pill.classList.remove('active'));
  
  const selectedPage = document.getElementById(pageId);
  if (selectedPage) {
    selectedPage.classList.add('active');
    
    const targetPill = Array.from(document.querySelectorAll('.pill')).find(pill => 
      pill.getAttribute('onclick').includes(`'${pageId}'`)
    );
    if(targetPill) targetPill.classList.add('active');
    
    setTimeout(() => {
      selectedPage.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 60);
  }
}

function closePages() {
  const pages = document.querySelectorAll('.page');
  pages.forEach(page => page.classList.remove('active'));
  
  const pills = document.querySelectorAll('.pill');
  pills.forEach(pill => pill.classList.remove('active'));
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
